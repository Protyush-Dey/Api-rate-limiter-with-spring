# Server Configuration
server.port=8080
spring.application.name=api-rate-limiter

# H2 Database Configuration (Phase 1 - in-memory)
spring.datasource.url=jdbc:h2:mem:ratelimiterdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Rate Limiter Default Configuration
ratelimiter.default.capacity=100
ratelimiter.default.refill-rate=10
ratelimiter.cleanup.interval-ms=60000

# Tier Configuration
ratelimiter.tier.free.capacity=100
ratelimiter.tier.free.refill-rate=10
ratelimiter.tier.pro.capacity=1000
ratelimiter.tier.pro.refill-rate=100
ratelimiter.tier.enterprise.capacity=10000
ratelimiter.tier.enterprise.refill-rate=1000
ratelimiter.tier.unlimited.capacity=999999999
ratelimiter.tier.unlimited.refill-rate=999999999

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.evolving.ratelimiter=INFO
